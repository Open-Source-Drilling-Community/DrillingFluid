apiVersion: v1
kind: Service
metadata:
  name: {{ include "norcedrillingdrillingfluidservice.fullname" . }}
  labels:
    {{- include "norcedrillingdrillingfluidservice.labels" . | nindent 4 }}  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "norcedrillingdrillingfluidservice.selectorLabels" . | nindent 4 }}

